<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Document Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background:rgb(255, 255, 255);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgb(255, 153, 0);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8edf2;
        }

        header h1 {
            font-size: 2.2rem;
            color: #eef9ff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header p {
            color: #edf0f2;
            font-size: 1rem;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .controls input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 2px solid #dce4ec;
            border-radius: 30px;
            font-size: 1rem;
            background: white;
            transition: all 0.2s;
        }

        .controls input:focus {
            outline: none;
            border-color: #2b7a8a;
            box-shadow: 0 0 0 3px rgba(43, 122, 138, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2bca0f;
            color: white;
        }

        .btn-primary:hover {
            background: #144b59;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 95, 112, 0.3);
        }

        .btn-secondary {
            background: #e8edf2;
            color: #1a3a4a;
        }

        .btn-secondary:hover {
            background: #d5dce4;
        }

        .btn-view {
            background: #090a08;
            color: #fefefe;
        }

        .btn-view:hover {
            background: #173843;
        }

        .btn-download {
            background: #ff7300;
            color: white;
        }

        .btn-download:hover {
            background: #ff0404;
        }

        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .doc-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8edf2;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .doc-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border-color: #c8d6e0;
        }

        .doc-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .doc-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a3a4a;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .doc-meta {
            font-size: 0.85rem;
            color: #6a8a9a;
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .doc-meta span {
            background: #f0f4f8;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .doc-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            flex-wrap: wrap;
        }

        .doc-actions .btn {
            flex: 1;
            text-align: center;
            padding: 10px 16px;
            font-size: 0.85rem;
            border-radius: 12px;
            min-width: 80px;
        }

        .loading {
            grid-column: 1 / -1;
            padding: 60px;
            text-align: center;
            color: #6a8a9a;
            font-size: 1.1rem;
        }

        .empty-message {
            grid-column: 1 / -1;
            padding: 60px;
            text-align: center;
            color: #6a8a9a;
            font-size: 1.1rem;
            background: #f8fafc;
            border-radius: 16px;
            border: 2px dashed #dce4ec;
        }

        footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e8edf2;
            text-align: center;
            color: #5a7a8a;
            font-size: 0.9rem;
        }

        .instruction-box {
            background: #f8fafc;
            border: 2px dashed #dce4ec;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .instruction-box h3 {
            color: #1a3a4a;
            margin-bottom: 10px;
        }

        .instruction-box code {
            background: #e8edf2;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .documents-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .instruction-box {
                padding: 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1> Document Library</h1>
            <p>Browse, view, and download your documents</p>
        </header>

        <!-- Instructions (you can remove this after setup) -->
        <div class="instruction-box" id="instructionBox">
            </p>
            <button id="hideInstructionsBtn" class="btn btn-secondary" style="margin-top: 10px;">
                 Got it, hide this
            </button>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder=" Search documents by title or filename..." />
            <button id="clearSearchBtn" class="btn btn-secondary">Clear</button>
        </div>

        <div id="documentsGrid" class="documents-grid">
            <div class="loading">Loading documents...</div>
        </div>

        <footer>
            <p>Total documents: <span id="docCount">0</span></p>
            <p style="margin-top: 5px; font-size: 0.8rem; color: #00ff00;">
            </p>
        </footer>
    </div>

    <script>
        // ================================================================
        // 📁 EDIT YOUR DOCUMENTS HERE
        // ================================================================
        // Add your documents to this array. Each document needs:
        //   id:       Unique number
        //   title:    Display name
        //   fileName: Actual file name in the documents/ folder
        //   icon:     (optional) Emoji icon
        //   type:     (optional) File type label
        // ================================================================

        const documents = [
            // ──────────────────────────────────────────────────────────────
            // 📝 ADD YOUR DOCUMENTS BELOW
            // ──────────────────────────────────────────────────────────────

            {
                id: 1,
                title: "My CV",
                fileName: "LuisrotichCV.pdf",
                
                type: "PDF"
            },
       
            {
                id: 2,
                title: "Transcript Year 1",
                fileName: "Transcrip-1.pdf",
                
                type: "PDF"
            },
              {
                id: 3,
                title: "Transcript Year 2",
                fileName: "Transcrip-2.pdf",
                
                type: "PDF"
            },
        ];
      

        // ================================================================
        // DO NOT EDIT BELOW THIS LINE
        // ================================================================

        let filteredDocuments = [...documents];

        // Get DOM elements
        const documentsGrid = document.getElementById('documentsGrid');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const docCount = document.getElementById('docCount');
        const instructionBox = document.getElementById('instructionBox');
        const hideInstructionsBtn = document.getElementById('hideInstructionsBtn');

        // Get file extension for icons
        function getFileIcon(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const iconMap = {
                'pdf': '📝',
                'doc': '📝',
                'docx': '📝',
                'xls': '📊',
                'xlsx': '📊',
                'ppt': '📽️',
                'pptx': '📽️',
                'txt': '📃',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'svg': '🖼️',
                'zip': '📦',
                'rar': '📦',
                'exe': '⚙️',
                'msi': '⚙️'
            };
            return iconMap[ext] || '📎';
        }

        // Get file type label
        function getFileType(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const typeMap = {
                'pdf': 'PDF',
                'doc': 'Word',
                'docx': 'Word',
                'xls': 'Excel',
                'xlsx': 'Excel',
                'ppt': 'PowerPoint',
                'pptx': 'PowerPoint',
                'txt': 'Text',
                'jpg': 'Image',
                'jpeg': 'Image',
                'png': 'Image',
                'gif': 'Image',
                'zip': 'Archive',
                'rar': 'Archive'
            };
            return typeMap[ext] || ext.toUpperCase();
        }

        // Render documents
        function renderDocuments(docs) {
            if (docs.length === 0) {
                documentsGrid.innerHTML = `
                    <div class="empty-message">
                         No documents found matching your search.
                    </div>
                `;
                docCount.textContent = '0';
                return;
            }

            let html = '';
            docs.forEach(doc => {
                const fileIcon = doc.icon || getFileIcon(doc.fileName);
                const fileType = doc.type || getFileType(doc.fileName);

                html += `
                    <div class="doc-card" data-id="${doc.id}">
                        <div class="doc-title">${escapeHtml(doc.title)}</div>
                        <div class="doc-meta">
                            <span> ${escapeHtml(doc.fileName)}</span>
                            <span>${escapeHtml(fileType)}</span>
                        </div>
                        <div class="doc-actions">
                            <button class="btn btn-view" onclick="viewDocument('${escapeHtml(doc.fileName)}')">
                                 View
                            </button>
                            <button class="btn btn-download" onclick="downloadDocument('${escapeHtml(doc.fileName)}')">
                                 Download
                            </button>
                        </div>
                    </div>
                `;
            });

            documentsGrid.innerHTML = html;
            docCount.textContent = docs.length;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // View document (opens in new tab)
        function viewDocument(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const viewableTypes = ['pdf', 'jpg', 'jpeg', 'png', 'gif', 'svg', 'txt'];

            if (viewableTypes.includes(ext)) {
                const filePath = `documents/${encodeURIComponent(fileName)}`;
                window.open(filePath, '_blank');
            } else {
                downloadDocument(fileName);
            }
        }

        // Download document
        function downloadDocument(fileName) {
            const filePath = `documents/${encodeURIComponent(fileName)}`;
            const link = document.createElement('a');
            link.href = filePath;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Search functionality
        function searchDocuments(searchTerm) {
            const term = searchTerm.toLowerCase().trim();

            if (!term) {
                filteredDocuments = [...documents];
            } else {
                filteredDocuments = documents.filter(doc =>
                    doc.title.toLowerCase().includes(term) ||
                    doc.fileName.toLowerCase().includes(term)
                );
            }

            renderDocuments(filteredDocuments);
        }

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            searchDocuments(e.target.value);
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchDocuments('');
        });

        // Hide instructions
        hideInstructionsBtn.addEventListener('click', () => {
            instructionBox.style.display = 'none';
        });

        // Check if documents folder exists (just a friendly console message)
        console.log('📁 Document Library loaded!');
        console.log(`📄 ${documents.length} documents configured.`);
        console.log('💡 Place your files in the "documents/" folder.');

        // Initial render
        renderDocuments(documents);
    </script>

</body>
</html>
